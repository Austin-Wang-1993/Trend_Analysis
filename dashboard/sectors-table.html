<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>板块表格 — Trend Analysis</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260623" />
  <link rel="stylesheet" href="/static/css/sectors-table.css?v=20260623" />
</head>
<body class="sector-table-page">
  <nav></nav>
  <main class="main-wide sector-page">
    <div class="sector-page-fixed">
      <div class="sector-kind-tabs" role="tablist">
        <a href="#" class="sector-kind-tab active" data-kind="sw_l3" role="tab">申万三级</a>
        <a href="#" class="sector-kind-tab" data-kind="ci_l3" role="tab">中信三级</a>
        <a href="#" class="sector-kind-tab" data-kind="dc_ind" role="tab">东财行业</a>
        <a href="#" class="sector-kind-tab" data-kind="ths_ind" role="tab">同花顺行业</a>
      </div>
      <h1 id="pageTitle">申万三级行业 — 每日排行</h1>
      <div class="toolbar">
        <div class="card-search-toolbar">
          <label>搜索
            <input type="search" id="searchInput" class="card-search-input" placeholder="板块名称" autocomplete="off" />
          </label>
          <p class="card-search-count" id="searchCount"></p>
          <div class="card-search-nav">
            <button type="button" id="searchPrev">上一个</button>
            <button type="button" id="searchNext">下一个</button>
          </div>
        </div>
        <label>排序
          <select id="sort">
            <option value="turnover_pct_desc">成交占比 ↓</option>
            <option value="turnover_pct_asc">成交占比 ↑</option>
            <option value="net_desc">净流入 ↓</option>
            <option value="net_asc">净流入 ↑</option>
            <option value="main_net_desc">主力净流入 ↓</option>
            <option value="main_net_asc">主力净流入 ↑</option>
            <option value="up_ratio_desc">上涨比例 ↓</option>
            <option value="down_ratio_desc">下跌比例 ↓</option>
          </select>
        </label>
        <label>天数
          <select id="days">
            <option value="5" selected>近 5 日</option>
            <option value="15">近 15 日</option>
            <option value="30">近 30 日</option>
          </select>
        </label>
      </div>
      <p class="footnote sector-board-hint" id="boardHint">左新右旧；点击卡片高亮同板块各列；点击板块名称查看成份股。</p>
      <div class="sector-dates-bar" id="stickyDates">
        <div class="sector-dates-inner" id="stickyDatesInner"></div>
      </div>
    </div>
    <div class="sector-cards-viewport" id="cardsViewport">
      <div class="sector-board-outer" id="boardOuter">
        <div id="board" class="sector-board"></div>
      </div>
    </div>
  </main>
  <script src="/static/js/format.js?v=20260623"></script>
  <script src="/static/js/api.js?v=20260623"></script>
  <script src="/static/js/nav.js?v=20260625"></script>
  <script src="/static/js/card-search.js?v=20260623"></script>
  <script>
    initNav();
    const params = new URLSearchParams(location.search);
    const HINT = '左新右旧；净流入取 net_mf_amount、主力净=大单+特大单净额；点击卡片高亮同行业各列，点击名称查看成份股。';
    const KIND_META = {
      sw_l3: { title: '申万三级行业 — 每日排行', hint: HINT },
      ci_l3: { title: '中信三级行业 — 每日排行', hint: HINT },
      dc_ind: { title: '东财行业 — 每日排行', hint: HINT },
      ths_ind: { title: '同花顺行业 — 每日排行', hint: HINT },
    };
    let currentKind = params.get('kind') || 'sw_l3';
    if (!KIND_META[currentKind]) currentKind = 'sw_l3';

    const sortEl = document.getElementById('sort');
    const daysEl = document.getElementById('days');
    const boardEl = document.getElementById('board');
    const boardOuter = document.getElementById('boardOuter');
    const stickyDatesInner = document.getElementById('stickyDatesInner');
    const cardsViewport = document.getElementById('cardsViewport');
    const pageTitle = document.getElementById('pageTitle');
    const boardHint = document.getElementById('boardHint');
    let highlightedCode = null;

    if (params.get('sort')) sortEl.value = params.get('sort');
    if (params.get('days')) daysEl.value = params.get('days');

    function syncKindUi() {
      document.querySelectorAll('.sector-kind-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.kind === currentKind);
      });
      const meta = KIND_META[currentKind];
      pageTitle.textContent = meta.title;
      boardHint.textContent = meta.hint;
      const q = new URLSearchParams({ kind: currentKind, days: daysEl.value, sort: sortEl.value });
      history.replaceState(null, '', `/sectors-table.html?${q}`);
    }

    document.querySelectorAll('.sector-kind-tab').forEach(tab => {
      tab.addEventListener('click', e => {
        e.preventDefault();
        const kind = tab.dataset.kind;
        if (kind === currentKind) return;
        currentKind = kind;
        highlightedCode = null;
        syncKindUi();
        load().catch(err => alert(err.message));
      });
    });

    function clearCrossHighlight() {
      highlightedCode = null;
      boardEl.querySelectorAll('.sector-card.highlighted').forEach(c => c.classList.remove('highlighted'));
    }

    const cardSearch = createCardSearch({
      inputEl: document.getElementById('searchInput'),
      countEl: document.getElementById('searchCount'),
      prevBtn: document.getElementById('searchPrev'),
      nextBtn: document.getElementById('searchNext'),
      boardEl,
      boardOuter,
      viewportEl: cardsViewport,
      syncHorizontalScroll: () => syncStickyDatesScroll(),
      getMatchText: card => card.dataset.searchText || '',
      onClearCrossHighlight: clearCrossHighlight,
    });

    function fmtMoney(v) {
      if (v == null || Number.isNaN(v)) return '—';
      return formatAmount(v).text;
    }

    function fmtPct(v) {
      if (v == null || Number.isNaN(v)) return '—';
      return formatPct(v);
    }

    function fmtNet(v) {
      if (typeof formatNetValue === 'function') {
        const n = formatNetValue(v);
        return `<span class="metric-net ${n.cls}">${n.text}</span>`;
      }
      if (v == null || Number.isNaN(v)) return '—';
      const cls = v > 0 ? 'positive' : v < 0 ? 'negative' : '';
      const prefix = v > 0 ? '+' : '';
      return `<span class="metric-net ${cls}">${prefix}${formatAmount(v).text}</span>`;
    }

    function stocksUrl(code) {
      const q = new URLSearchParams({
        sector: code,
        kind: currentKind,
        days: daysEl.value,
        sort: sortEl.value,
      });
      return `/sector-stocks.html?${q}`;
    }

    function renderCard(sector) {
      const code = sector.sector_code;
      const cls = highlightedCode === code ? 'sector-card highlighted' : 'sector-card';
      const title = sector.sector_path || sector.sector_name || '';
      const name = escapeHtml(title);
      const up = sector.up_count || 0;
      const down = sector.down_count || 0;
      return `
        <article class="${cls}" data-sector-code="${escapeAttr(code)}" data-search-text="${escapeAttr(title)}" tabindex="0">
          <div class="sector-card-head">
            <span class="sector-rank">#${sector.rank}</span>
            <a class="sector-name" href="${stocksUrl(code)}">${name}</a>
          </div>
          <dl class="sector-metrics">
            <div><dt>成交</dt><dd>${fmtMoney(sector.turnover)} <span class="metric-pct">${fmtPct(sector.turnover_pct)}</span></dd></div>
            <div><dt>净流入</dt><dd>${fmtNet(sector.net_active)} <span class="metric-pct">${fmtPct(sector.net_pct)}</span></dd></div>
            <div><dt>主力净</dt><dd>${fmtNet(sector.main_net)}</dd></div>
            <div><dt>涨跌</dt><dd><span class="updown-count">${up}/${down}</span> <span class="metric-pct">${fmtPct(sector.up_ratio)}</span></dd></div>
          </dl>
        </article>`;
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
    }

    function escapeAttr(s) {
      return String(s).replace(/"/g, '&quot;');
    }

    function bindCardEvents() {
      boardEl.querySelectorAll('.sector-card').forEach(card => {
        card.onclick = (e) => {
          if (e.target.closest('.sector-name')) return;
          if (cardSearch.isActive()) return;
          const code = card.dataset.sectorCode;
          highlightedCode = highlightedCode === code ? null : code;
          boardEl.querySelectorAll('.sector-card').forEach(c => {
            c.classList.toggle('highlighted', highlightedCode && c.dataset.sectorCode === highlightedCode);
          });
        };
      });
    }

    function renderDateHead(tradeDate) {
      return `<div class="sector-date-cell" title="${escapeAttr(tradeDate)}">${shortDate(tradeDate)}</div>`;
    }

    function syncStickyDatesScroll() {
      stickyDatesInner.style.transform = `translateX(-${boardOuter.scrollLeft}px)`;
    }

    if (!boardOuter.dataset.scrollBound) {
      boardOuter.addEventListener('scroll', syncStickyDatesScroll, { passive: true });
      boardOuter.dataset.scrollBound = '1';
    }

    async function load() {
      boardEl.innerHTML = '<p class="loading">加载中…</p>';
      stickyDatesInner.innerHTML = '';
      syncKindUi();
      const data = await apiGet(`/api/sectors/table?kind=${encodeURIComponent(currentKind)}&days=${daysEl.value}&sort=${sortEl.value}`);
      const columns = data.columns || [];
      if (!columns.length) {
        boardEl.innerHTML = '<p class="loading">暂无数据</p>';
        return;
      }
      stickyDatesInner.innerHTML = columns.map(col => renderDateHead(col.trade_date)).join('');
      boardOuter.scrollLeft = 0;
      syncStickyDatesScroll();
      boardEl.innerHTML = columns.map(col => `
        <section class="sector-column">
          <div class="sector-column-cards">
            ${(col.sectors || []).map(renderCard).join('')}
          </div>
        </section>
      `).join('');
      bindCardEvents();
      if (highlightedCode && !cardSearch.isActive()) {
        boardEl.querySelectorAll('.sector-card').forEach(c => {
          c.classList.toggle('highlighted', c.dataset.sectorCode === highlightedCode);
        });
      }
      cardSearch.onBoardRendered();
    }

    sortEl.addEventListener('change', () => load().catch(e => alert(e.message)));
    daysEl.addEventListener('change', () => load().catch(e => alert(e.message)));
    syncKindUi();
    load().catch(e => { boardEl.innerHTML = `<p class="loading status-fail">${escapeHtml(e.message)}</p>`; });
  </script>
</body>
</html>
