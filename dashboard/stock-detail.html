<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个股详情 — Trend Analysis</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260620" />
  <link rel="stylesheet" href="/static/css/sectors-table.css?v=20260620" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <nav></nav>
  <main class="main-wide">
    <div class="page-nav-row">
      <a class="page-back" id="backStocks" href="#">← 返回成份股</a>
      <p class="breadcrumb" id="breadcrumb"></p>
    </div>
    <h1 id="title">个股详情</h1>
    <div class="toolbar">
      <label>天数
        <select id="days">
          <option value="5" selected>近 5 日</option>
          <option value="15">近 15 日</option>
          <option value="30">近 30 日</option>
        </select>
      </label>
    </div>
    <p class="footnote">成交额 / 净流入 / 主力净流入；净流入取 net_mf_amount，主力净=大单+特大单净额。X 轴左新右旧。</p>
    <div id="industries" class="stock-industries"></div>
    <div class="card"><div id="chart-turnover" class="chart"></div></div>
    <div class="card"><div id="chart-net" class="chart"></div></div>
    <div class="card"><div id="chart-mainnet" class="chart"></div></div>
  </main>
  <script src="/static/js/format.js?v=20260621"></script>
  <script src="/static/js/api.js?v=20260621"></script>
  <script src="/static/js/charts.js?v=20260621"></script>
  <script src="/static/js/nav.js?v=20260621"></script>
  <script>
    initNav();
    const params = new URLSearchParams(location.search);
    const stock = params.get('stock');
    const sector = params.get('sector');
    const kind = params.get('kind') || 'sw_l3';
    const sort = params.get('sort') || 'turnover_pct_desc';
    const daysEl = document.getElementById('days');
    const backStocks = document.getElementById('backStocks');
    const breadcrumbEl = document.getElementById('breadcrumb');
    const titleEl = document.getElementById('title');
    const industriesEl = document.getElementById('industries');

    if (params.get('days')) daysEl.value = params.get('days');

    const KIND_LABELS = { sw_l3: '申万', ci_l3: '中信', dc_ind: '东财', ths_ind: '同花顺' };

    function stocksUrl() {
      return `/sector-stocks.html?sector=${encodeURIComponent(sector || '')}&kind=${encodeURIComponent(kind)}&days=${encodeURIComponent(daysEl.value)}&sort=${encodeURIComponent(sort)}`;
    }

    function tableUrl() {
      return `/sectors-table.html?kind=${encodeURIComponent(kind)}&days=${encodeURIComponent(daysEl.value)}&sort=${encodeURIComponent(sort)}`;
    }

    function renderIndustries(industries) {
      const items = Object.keys(KIND_LABELS).map(k => {
        const ind = (industries || {})[k];
        const txt = ind ? escapeHtml(ind.sector_path || ind.sector_name) : '—';
        return `<div><dt>${KIND_LABELS[k]}</dt><dd>${txt}</dd></div>`;
      }).join('');
      industriesEl.innerHTML = `<dl class="sector-metrics industries-grid">${items}</dl>`;
    }

    function syncNav(data) {
      const cur = (data.industries || {})[kind];
      const sectorName = cur ? (cur.sector_name || '') : '';
      const stockLabel = `${data.stock_code} ${data.stock_name || ''}`.trim();
      backStocks.href = stocksUrl();
      breadcrumbEl.innerHTML = [
        `<a href="${tableUrl()}">板块表格</a>`,
        '&gt;',
        `<a href="${stocksUrl()}">${escapeHtml(sectorName || '成份股')}</a>`,
        '&gt;',
        escapeHtml(stockLabel),
      ].join(' ');
      titleEl.textContent = stockLabel;
      document.title = `${stockLabel} — Trend Analysis`;
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
    }

    let charts = [];
    async function load() {
      if (!stock) {
        document.querySelector('main').innerHTML = '<p class="loading">缺少 stock 参数</p>';
        return;
      }
      const data = await apiGet(`/api/stocks/${encodeURIComponent(stock)}/series?days=${daysEl.value}`);
      syncNav(data);
      renderIndustries(data.industries);
      const series = data.series || [];
      const ids = ['chart-turnover', 'chart-net', 'chart-mainnet'];
      if (!series.length) {
        ids.forEach(id => { document.getElementById(id).innerHTML = '<p class="loading">暂无数据</p>'; });
        return;
      }
      // series 为新→旧；图表 X 轴左新右旧，直接用
      const dates = series.map(x => shortDate(x.trade_date));
      charts.forEach(c => disposeChart(c));
      charts = [
        renderBar(document.getElementById('chart-turnover'), barChartOption('成交额', dates, series.map(x => x.turnover || 0), '#3b82f6')),
        renderBar(document.getElementById('chart-net'), barChartOption('净流入', dates, series.map(x => x.net_active || 0), '#f59e0b')),
        renderBar(document.getElementById('chart-mainnet'), barChartOption('主力净流入', dates, series.map(x => x.main_net || 0), '#8b5cf6')),
      ];
    }

    daysEl.addEventListener('change', () => load().catch(e => alert(e.message)));
    load().catch(e => { document.querySelector('main').innerHTML = `<p class="loading status-fail">${escapeHtml(e.message)}</p>`; });
  </script>
</body>
</html>
