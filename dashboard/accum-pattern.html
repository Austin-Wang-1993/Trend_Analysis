<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>量价吸筹 — Trend Analysis</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260712" />
  <style>
    table.ap { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.ap th, table.ap td { padding: 8px 10px; border-bottom: 1px solid #1c2740; text-align: right; white-space: nowrap; }
    table.ap th.tl, table.ap td.tl { text-align: left; }
    table.ap tbody tr:hover { background: #131d30; cursor: pointer; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 10px 0; }
    .toolbar button { background: #1a2740; color: #cfe0f5; border: 1px solid #2a3850; border-radius: 6px; padding: 6px 12px; cursor: pointer; }
    .status { font-size: 13px; color: #8b9cb3; margin: 8px 0; line-height: 1.6; }
    .legend { font-size: 12px; color: #6b7a92; line-height: 1.7; margin-bottom: 12px; }
    .funnel { font-size: 12px; color: #94a3b8; line-height: 1.8; margin: 10px 0 14px; padding: 10px 12px; background: #111827; border-radius: 8px; border: 1px solid #1f2937; }
    .tag-prog { color: #60a5fa; font-size: 11px; }
    .tag-done { color: #22c55e; font-size: 11px; }
    .card-diag { margin: 16px 0; padding: 12px 14px; background: #111827; border: 1px solid #1f2937; border-radius: 8px; }
    .card-diag h2 { font-size: 1rem; margin: 0 0 10px; color: #e2e8f0; }
    .diag-form { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 12px; }
    .diag-form input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 6px 8px; border-radius: 6px; }
    .step-pass { color: #22c55e; }
    .step-fail { color: #ef4444; }
    .step-warn { color: #f59e0b; }
    .step-skip { color: #94a3b8; }
    .diag-steps { font-size: 13px; line-height: 1.9; }
    .diag-detail { font-size: 12px; color: #64748b; margin-left: 1.2em; }
  </style>
</head>
<body>
  <nav></nav>
  <main class="main-wide">
    <h1>量价吸筹</h1>
    <p class="status" id="status">加载中…</p>
    <div class="toolbar">
      <button type="button" id="btnScan">立即重算</button>
      <label>阶段
        <select id="phaseFilter">
          <option value="">全部</option>
          <option value="wash_in_progress">洗盘进行中</option>
          <option value="wash_complete">洗盘完成</option>
        </select>
      </label>
    </div>
    <p class="legend">
      全 A（排除 ST、停牌）：T₁ 集中放量（N≥3、折线涨≥30%）后进入 T₂ 缩量洗盘观察期 M=int(k×N)。
      <strong>洗盘进行中即入选</strong>（锚点 B）。列表「吸筹量/洗盘中/洗÷吸」为 T₁、T₂ 窗口内原始成交量合计（万股），洗÷吸越小表示洗盘换手相对越少。
      参数见 <a href="/admin.html#accum-pattern-config">管理页</a>。
    </p>

    <div class="card-diag" id="diagBox">
      <h2>形态检测（调试用）</h2>
      <p class="legend" style="margin-bottom:10px">
        输入<strong>股票代码</strong>与您认为的 <strong>T₀ 放量日</strong>，可选<strong>扫描日</strong>（默认最近交易日）。
        系统逐步说明符合到哪一步、在哪一步失败，并与扫描器实际入选形态对比。
      </p>
      <div class="diag-form">
        <label>代码 <input id="diagCode" type="text" maxlength="6" placeholder="600519" style="width:5.5rem" /></label>
        <label>T₀ 日 <input id="diagT0" type="date" /></label>
        <label>扫描日 <input id="diagScan" type="date" /></label>
        <button type="button" id="btnDiag">检测</button>
      </div>
      <div id="diagResult" class="diag-steps"></div>
    </div>

    <div id="funnelBox"></div>
    <div class="table-wrap" id="tableWrap"></div>
  </main>
  <script src="/static/js/api.js?v=20260712"></script>
  <script src="/static/js/nav.js?v=20260712"></script>
  <script>
    initNav();
    const statusEl = document.getElementById('status');
    const tableWrap = document.getElementById('tableWrap');

    function num(v, d=2) { return v == null || Number.isNaN(v) ? '—' : Number(v).toFixed(d); }
    function pct(v) { return v == null ? '—' : `${num(v)}%`; }
    function volWan(v) {
      if (v == null || Number.isNaN(v)) return '—';
      return (Number(v) / 10000).toFixed(1);
    }
    function washExpandPct(r) {
      if (r == null || r.wash_expand_vol_ratio == null) return '—';
      return `${(Number(r.wash_expand_vol_ratio) * 100).toFixed(1)}%`;
    }
    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function phaseTag(p) {
      if (p === 'wash_in_progress') return '<span class="tag-prog">洗盘进行中</span>';
      if (p === 'wash_complete') return '<span class="tag-done">洗盘完成</span>';
      return escapeHtml(p || '—');
    }
    function formatProgress(p) {
      if (!p) return '扫描中…';
      if (p.startsWith('cache:')) return `补缓存 ${p.slice(6)}`;
      if (p.startsWith('compute:')) return `计算 ${p.slice(8)}`;
      if (p === 'compute') return '全市场计算中…';
      return p;
    }

    function renderFunnel(meta) {
      const el = document.getElementById('funnelBox');
      if (!el) return;
      const f = meta.funnel;
      if (!f || !f.evaluated) {
        el.innerHTML = '';
        return;
      }
      el.innerHTML = `<div class="funnel"><strong>筛选漏斗</strong>（扫描日 ${meta.trade_date}）<br/>
        有效样本：<strong>${f.evaluated}</strong> ·
        洗盘进行中：<strong>${f.wash_in_progress || 0}</strong> ·
        洗盘完成：<strong>${f.wash_complete || 0}</strong> ·
        入选合计：<strong>${f.listed || 0}</strong>
      </div>`;
    }

    function renderTable(data, meta) {
      const items = data.items || [];
      renderFunnel(meta || data);
      if (!items.length) {
        tableWrap.innerHTML = '<p class="loading">暂无入选（请先 <a href="/admin.html#accum-pattern-config">管理页重算</a>）</p>';
        return;
      }
      const rows = items.map(r => `<tr data-code="${r.stock_code}">
        <td class="tl">${r.stock_code}</td>
        <td class="tl">${escapeHtml(r.stock_name || '')}</td>
        <td class="tl"><span class="sl-path">${escapeHtml(r.sector_path || '—')}</span></td>
        <td>${phaseTag(r.phase)}</td>
        <td>${r.t0_date || '—'}</td>
        <td>${r.n_days ?? '—'}</td>
        <td>${r.wash_days_done ?? '—'}/${r.m_target ?? '—'}</td>
        <td>${pct(r.price_rise_pct)}</td>
        <td>${pct(r.drawdown_ratio)}</td>
        <td>${volWan(r.expand_vol_sum)}</td>
        <td>${volWan(r.wash_vol_sum)}</td>
        <td>${washExpandPct(r)}</td>
        <td>${num(r.close)}</td>
      </tr>`).join('');
      tableWrap.innerHTML = `<table class="ap"><thead><tr>
        <th class="tl">代码</th><th class="tl">名称</th><th class="tl">板块</th>
        <th>阶段</th><th>T₀</th><th>N</th><th>洗盘</th><th>折线涨幅</th><th>回撤%</th>
        <th>吸筹量</th><th>洗盘中</th><th>洗÷吸</th><th>收盘(qfq)</th>
      </tr></thead><tbody>${rows}</tbody></table>`;
      tableWrap.querySelectorAll('tbody tr').forEach(tr => {
        tr.onclick = () => {
          const code = tr.dataset.code;
          location.href = `/accum-pattern-detail.html?code=${encodeURIComponent(code)}`;
        };
      });
    }

    function renderDiagnose(r) {
      const el = document.getElementById('diagResult');
      const cls = { pass: 'step-pass', fail: 'step-fail', warn: 'step-warn', skip: 'step-skip' };
      const head = `<p><strong>${r.stock_code || ''}</strong> · T₀=${r.t0_date} · 扫描日=${r.scan_date} · 总结：<span class="${cls[r.overall] || ''}">${r.overall}</span>${r.failed_at ? ` · 首败步骤：${r.failed_at}` : ''}</p>`;
      const steps = (r.steps || []).map(s => {
        const icon = { pass: '✓', fail: '✗', warn: '△', skip: '○' }[s.status] || '?';
        let extra = '';
        if (s.id === 'expand_volume' && s.days && r.failed_at === 'expand_volume') {
          const bad = s.days.filter(d => !d.passed).slice(0, 3);
          if (bad.length) {
            extra = `<div class="diag-detail">量能未达标示例：${bad.map(d => {
              const thr = d.threshold_mult != null ? num(d.threshold_mult, 1) : '—';
              return `${d.trade_date} 量/MA5=${num(d.vol_ratio)}（需≥${thr}）`;
            }).join('；')}</div>`;
          }
        }
        if (s.id === 'wash_volume' && s.days) {
          const bad = s.days.filter(d => !d.passed).slice(0, 3);
          if (bad.length) extra = `<div class="diag-detail">异常日：${bad.map(d => `${d.trade_date}${d.reason ? '('+d.reason+')' : ''}`).join('；')}</div>`;
        }
        return `<div class="${cls[s.status] || ''}">${icon} <strong>${escapeHtml(s.name)}</strong> — ${escapeHtml(s.message)}</div>${extra}`;
      }).join('');
      el.innerHTML = head + steps;
    }

    async function load() {
      const phase = document.getElementById('phaseFilter').value;
      const q = phase ? `?phase=${encodeURIComponent(phase)}` : '';
      const [meta, picks] = await Promise.all([
        apiGet('/api/accum-pattern/meta'),
        apiGet(`/api/accum-pattern/picks${q}`),
      ]);
      const err = meta.last_error || picks.last_error;
      statusEl.textContent = `扫描日 ${picks.trade_date} · 入选 ${picks.pick_count} 只`
        + (meta.last_scan_at ? ` · 上次 ${meta.last_scan_at.slice(0, 19).replace('T', ' ')}` : '')
        + (err ? ` · 提示：${err}` : '');
      if (!document.getElementById('diagScan').value) {
        document.getElementById('diagScan').value = picks.trade_date || meta.trade_date || '';
      }
      renderTable(picks, meta);
    }

    document.getElementById('phaseFilter').onchange = () => load().catch(e => alert(e.message));
    document.getElementById('btnScan').onclick = async () => {
      if (!confirm('补全 qfq 缓存并扫描量价吸筹？')) return;
      statusEl.textContent = '提交任务…';
      try {
        const r = await apiPost('/api/admin/accum-pattern/scan', {});
        let job = r;
        while (true) {
          const st = await apiGet(`/api/accum-pattern/scan/status?job_id=${encodeURIComponent(job.job_id)}`);
          if (!st.active) break;
          statusEl.textContent = formatProgress(st.job?.progress || st.job?.status);
          await new Promise(x => setTimeout(x, 1500));
        }
        await load();
      } catch (e) {
        alert(e.message || '扫描失败');
        load().catch(console.error);
      }
    };

    document.getElementById('btnDiag').onclick = async () => {
      const code = document.getElementById('diagCode').value.trim();
      const t0 = document.getElementById('diagT0').value;
      const scan = document.getElementById('diagScan').value;
      if (!/^\d{6}$/.test(code)) return alert('请输入 6 位股票代码');
      if (!t0) return alert('请选择 T₀ 放量日');
      const el = document.getElementById('diagResult');
      el.textContent = '检测中（必要时补缓存）…';
      try {
        let url = `/api/accum-pattern/diagnose?stock_code=${encodeURIComponent(code)}&t0_date=${encodeURIComponent(t0)}`;
        if (scan) url += `&scan_date=${encodeURIComponent(scan)}`;
        renderDiagnose(await apiGet(url));
      } catch (e) {
        el.innerHTML = `<span class="step-fail">${escapeHtml(e.message || '检测失败')}</span>`;
      }
    };

    load().catch(e => {
      statusEl.textContent = '加载失败';
      tableWrap.innerHTML = `<p class="loading">${escapeHtml(e.message)}</p>`;
    });
  </script>
</body>
</html>
