<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>全 A 概览 — Trend Analysis</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <nav></nav>
  <main>
    <h1>近 5 日 A 股概览</h1>
    <div class="card"><div id="chart-turnover" class="chart"></div></div>
    <div class="card"><div id="chart-buy" class="chart"></div></div>
    <div class="card"><div id="chart-sell" class="chart"></div></div>
    <p class="footnote" id="footnote"></p>
  </main>
  <script src="/static/js/format.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/charts.js?v=20260621"></script>
  <script src="/static/js/nav.js"></script>
  <script>
    initNav();
    (async () => {
      try {
        const meta = await apiGet('/api/meta/trading-days?days=5');
        const data = await apiGet('/api/market?days=5');
        const dates = data.trade_dates || meta.trade_dates || [];
        document.getElementById('footnote').textContent =
          `当前展示 ${dates.length} 个交易日：${dates.join('、') || '暂无数据'}`;
        if (!dates.length) return;
        renderBar(document.getElementById('chart-turnover'),
          barChartOption('成交额', dates, data.turnover_series.map(x => x.value), '#3b82f6'));
        renderBar(document.getElementById('chart-buy'),
          barChartOption('主买额', dates, data.active_buy_series.map(x => x.value), '#22c55e'));
        renderBar(document.getElementById('chart-sell'),
          barChartOption('主卖额', dates, data.active_sell_series.map(x => x.value), '#ef4444'));
      } catch (e) {
        document.querySelector('main').innerHTML = `<p class="loading">加载失败：${e.message}</p>`;
      }
    })();
  </script>
</body>
</html>
