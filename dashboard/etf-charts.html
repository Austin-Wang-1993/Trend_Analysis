<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ETF 图表 — Trend Analysis</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <nav></nav>
  <main>
    <h1>ETF — 近 5 日成交额 Top</h1>
    <div class="toolbar">
      <label>Top <select id="top"><option>50</option><option>100</option><option>200</option></select></label>
      <input id="q" placeholder="搜索" />
      <button id="go">刷新</button>
    </div>
    <div id="list"></div>
  </main>
  <script src="/static/js/format.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/charts.js?v=20260621"></script>
  <script src="/static/js/nav.js?v=20260624"></script>
  <script>
    initNav();
    async function load() {
      const top = document.getElementById('top').value;
      const q = document.getElementById('q').value;
      const items = await apiGet(`/api/etf/charts?days=5&top=${top}&q=${encodeURIComponent(q)}`);
      const list = document.getElementById('list');
      list.innerHTML = '';
      items.forEach((item, i) => {
        const dates = item.turnover_series.map(x => x.trade_date);
        const div = document.createElement('div');
        div.className = 'card accordion-item';
        div.innerHTML = `
          <div class="accordion-head"><span>${item.etf_code} ${item.etf_name || ''}</span><span>▶</span></div>
          <div class="accordion-body"><div id="ec-${i}" class="chart"></div></div>`;
        list.appendChild(div);
        div.querySelector('.accordion-head').addEventListener('click', () => {
          div.classList.toggle('open');
          if (div.classList.contains('open') && !div._chart) {
            div._chart = renderBar(document.getElementById(`ec-${i}`),
              barChartOption('成交额', dates, item.turnover_series.map(x => x.value)));
          }
        });
      });
    }
    document.getElementById('go').onclick = () => load().catch(e => alert(e.message));
    load().catch(e => { document.querySelector('main').innerHTML = `<p class="loading">${e.message}</p>`; });
  </script>
</body>
</html>
