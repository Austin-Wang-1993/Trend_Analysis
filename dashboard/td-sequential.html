<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>神奇九转 — Trend Analysis</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260628" />
  <style>
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 10px 0; }
    .toolbar button { background: #1a2740; color: #cfe0f5; border: 1px solid #2a3850; border-radius: 6px; padding: 6px 12px; cursor: pointer; }
    .status { font-size: 13px; color: #8b9cb3; margin: 8px 0; line-height: 1.6; }
    .legend { font-size: 12px; color: #6b7a92; line-height: 1.7; margin-bottom: 12px; }
    .funnel { font-size: 12px; color: #94a3b8; line-height: 1.8; margin: 10px 0 14px; padding: 10px 12px; background: #111827; border-radius: 8px; border: 1px solid #1f2937; }
    .funnel strong { color: #cbd5e1; }
    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(220px, 1fr));
      gap: 10px;
      align-items: start;
      overflow-x: auto;
    }
    @media (max-width: 1400px) { .board { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (max-width: 900px) { .board { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .board { grid-template-columns: 1fr; } }
    .col-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; min-height: 200px; display: flex; flex-direction: column; }
    .col-head { padding: 10px 12px; border-bottom: 1px solid #1e293b; font-size: 13px; font-weight: 600; color: #e2e8f0; flex-shrink: 0; }
    .col-head span { color: #64748b; font-weight: 400; }
    .col-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .col-table { display: block; }
    .col-scroll { max-height: 440px; overflow: auto; -webkit-overflow-scrolling: touch; }
    table.td {
      border-collapse: separate;
      border-spacing: 0;
      width: max-content;
      min-width: 100%;
      font-size: 11px;
    }
    table.td th, table.td td {
      padding: 5px 8px;
      border-bottom: 1px solid #1c2740;
      text-align: right;
      white-space: nowrap;
    }
    table.td thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #131d30;
      box-shadow: 0 1px 0 #1c2740;
    }
    table.td th.tl, table.td td.tl { text-align: left; }
    table.td tbody tr { cursor: pointer; }
    table.td tbody tr:hover { background: #131d30; }
    .tag { font-size: 10px; padding: 1px 4px; border-radius: 3px; background: #1e3a5f; color: #93c5fd; }
    .empty { padding: 16px; color: #64748b; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <nav></nav>
  <main class="main-wide">
    <h1>神奇九转（TD 抄底）</h1>
    <p class="status" id="status">加载中…</p>
    <div class="toolbar">
      <button type="button" id="btnScan">立即重算</button>
    </div>
    <p class="legend">
      全 A 盘后扫描（排除 ST、停牌）。五列递进漏斗：每列在左列清单基础上继续过滤，并继承左列全部字段。
      列3 在列2 基础上：区间间隔合格且计数进入「临近13」区间（默认 10–13，含已完成13）。
      列4 另要求十三转完成日落在回溯窗内（可不经过列3展示态）。口诀：抄底等缩量长腿。
      <a href="/admin.html#td-sequential-config">参数配置</a>
    </p>
    <div id="funnelBox" class="funnel"></div>
    <div class="board" id="board"></div>
  </main>
  <script src="/static/js/api.js?v=20260628"></script>
  <script src="/static/js/nav.js?v=20260628"></script>
  <script>
    initNav();
    const statusEl = document.getElementById('status');
    const boardEl = document.getElementById('board');
    const COL_LABELS = {
      '1': '① 九转',
      '2': '② 量价',
      '3': '③ 临近13',
      '4': '④ 十三转',
      '5': '⑤ 底背离',
    };

    // 每列在上一列字段基础上追加本列字段
    const COL_FIELDS = {
      '1': [
        { key: 'code', tl: true, label: '代码' },
        { key: 'name', tl: true, label: '名称' },
        { key: 'setup_9_date', label: '九转日' },
        { key: 'setup_9_close', label: '收盘', fmt: 'num' },
      ],
      '2': [
        { key: 'vol_tag', label: '量', tag: true },
        { key: 'lower_shadow_ratio', label: '下影比', fmt: 'num' },
      ],
      '3': [
        { key: 'cd_count', label: '计数' },
        { key: 'cd_remain', label: '剩余' },
      ],
      '4': [
        { key: 'countdown_13_date', label: '13转日' },
        { key: 'stop_loss_price', label: '止损', fmt: 'num' },
      ],
      '5': [
        { key: 'macd_hist_setup9', label: 'MACD9', fmt: 'num3' },
        { key: 'macd_hist_cd13', label: 'MACD13', fmt: 'num3' },
      ],
    };

    function num(v, d=2) { return v == null || Number.isNaN(v) ? '—' : Number(v).toFixed(d); }

    function fieldsUpTo(col) {
      const out = [];
      for (const c of ['1','2','3','4','5']) {
        out.push(...COL_FIELDS[c]);
        if (c === col) break;
      }
      return out;
    }

    function volTagLabel(v) {
      const map = { shrink: '缩量', expand: '放量', neutral: '中性' };
      return map[v] || v || '—';
    }

    function cellValue(r, f) {
      if (f.key === 'code') {
        const link = `/td-sequential-detail.html?code=${r.stock_code}&trade_date=${encodeURIComponent(r.trade_date || '')}`;
        return `<a href="${link}">${r.stock_code}</a>`;
      }
      if (f.key === 'name') return r.stock_name || '';
      if (f.key === 'cd_remain') {
        const c = r.cd_count;
        return c == null ? '—' : Math.max(0, 13 - c);
      }
      const v = r[f.key];
      if (f.tag) return `<span class="tag">${volTagLabel(v)}</span>`;
      if (f.fmt === 'num3') return num(v, 3);
      if (f.fmt === 'num') return num(v);
      return v ?? '—';
    }

    function renderFunnel(meta, funnel) {
      const el = document.getElementById('funnelBox');
      if (!funnel) { el.innerHTML = ''; return; }
      const rows = [
        ['可评估', funnel.evaluated],
        ['列1 九转', funnel.col1_setup9],
        ['列2 量价', funnel.col2_vol_price],
        ['列3 临近13', funnel.col3_near13],
        ['列4 十三转', funnel.col4_cd13],
        ['列5 底背离', funnel.col5_macd_div],
      ];
      el.innerHTML = `<strong>漏斗</strong>（扫描日 ${meta.trade_date}，回溯 ${meta.lookback_days || 20} 日）<br/>`
        + rows.map(([l, n]) => `${l}：<strong>${n ?? '—'}</strong>`).join(' · ');
    }

    function renderBoard(data) {
      const cols = data.columns || {};
      boardEl.innerHTML = ['1','2','3','4','5'].map(c => {
        const items = cols[c] || [];
        const fields = fieldsUpTo(c);
        const head = fields.map(f => `<th${f.tl ? ' class="tl"' : ''}>${f.label}</th>`).join('');
        const rows = items.map(r => `<tr onclick="location.href='/td-sequential-detail.html?code=${r.stock_code}&trade_date=${encodeURIComponent(data.trade_date)}'">`
              + fields.map(f => `<td${f.tl ? ' class="tl"' : ''}>${cellValue(r, f)}</td>`).join('')
              + '</tr>').join('');
        const body = items.length
          ? `<div class="col-table"><div class="col-scroll"><table class="td"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div></div>`
          : '<div class="empty">暂无</div>';
        return `<div class="col-card"><div class="col-head">${COL_LABELS[c]} <span>(${items.length})</span></div><div class="col-body">${body}</div></div>`;
      }).join('');
    }

    function formatJobProgress(job) {
      if (!job) return '';
      const p = job.progress || '';
      if (p.startsWith('cache:')) return `补缓存 ${p.slice(6)} 日`;
      if (p === 'compute') return '计算九转…';
      if (p === 'done') return '完成';
      if (job.status === 'running') return '运行中…';
      return p;
    }

    function updateStatus(meta) {
      const job = meta.scan_job;
      let extra = '';
      if (job && (job.status === 'pending' || job.status === 'running')) {
        extra = ` · 扫描中：${formatJobProgress(job)}`;
      } else if (meta.last_scan_at) {
        extra = ` · 上次扫描 ${meta.last_scan_at.replace('T', ' ').slice(0, 19)}`;
      }
      if (meta.last_error) extra += ` · <span style="color:#f59e0b">${meta.last_error}</span>`;
      statusEl.innerHTML = `扫描日 <strong>${meta.trade_date}</strong> · 回溯 <strong>${meta.lookback_days}</strong> 交易日${extra}`;
    }

    async function pollScan(jobId) {
      while (true) {
        const q = jobId ? `?job_id=${encodeURIComponent(jobId)}` : '';
        const st = await apiGet(`/api/td-sequential/scan/status${q}`);
        const job = st.job;
        if (job) statusEl.textContent = `扫描中 · ${formatJobProgress(job)}`;
        if (!st.active) {
          if (job?.status === 'failed') throw new Error(job.error_message || '扫描失败');
          return job;
        }
        await new Promise(r => setTimeout(r, 2000));
      }
    }

    async function load() {
      const meta = await apiGet('/api/td-sequential/meta');
      const board = await apiGet('/api/td-sequential/board');
      updateStatus(meta);
      renderFunnel(board, board.funnel || meta.funnel);
      renderBoard(board);
    }

    document.getElementById('btnScan').addEventListener('click', async () => {
      try {
        statusEl.textContent = '提交任务…';
        const r = await apiPost('/api/admin/td-sequential/scan', {});
        await pollScan(r.job_id);
        await load();
      } catch (e) {
        statusEl.textContent = '重算失败：' + (e.message || e);
        load().catch(() => {});
      }
    });

    load().catch(e => { statusEl.textContent = e.message || '加载失败'; });

    (async () => {
      try {
        const st = await apiGet('/api/td-sequential/scan/status');
        if (st.active && st.job?.job_id) {
          statusEl.textContent = '恢复进度…';
          await pollScan(st.job.job_id);
          await load();
        }
      } catch (_) { /* ignore */ }
    })();
  </script>
</body>
</html>
