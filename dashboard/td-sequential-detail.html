<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>九转明细 — Trend Analysis</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260626" />
  <style>
    .back { margin: 8px 0 16px; font-size: 13px; }
    .summary { font-size: 13px; color: #94a3b8; line-height: 1.8; margin-bottom: 16px; padding: 12px; background: #111827; border-radius: 8px; }
    .summary strong { color: #e2e8f0; }
    h2 { font-size: 1rem; margin: 20px 0 8px; color: #cbd5e1; }
    table.det { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 12px; }
    table.det th, table.det td { padding: 6px 10px; border-bottom: 1px solid #1c2740; text-align: right; }
    table.det th.tl, table.det td.tl { text-align: left; }
    .ok { color: #22c55e; } .no { color: #ef4444; }
    .filter-box { font-size: 13px; color: #94a3b8; line-height: 1.9; }
    .macd-sub { margin-top: 10px; }
  </style>
</head>
<body>
  <nav></nav>
  <main class="main-wide">
    <p class="back"><a href="/td-sequential.html">← 返回神奇九转看板</a></p>
    <h1 id="title">九转明细</h1>
    <p id="status" class="footnote">加载中…</p>
    <div id="summary" class="summary"></div>
    <h2>区间 A — 九转 Setup（连续 9 日）</h2>
    <div class="table-wrap" id="setupTable"></div>
    <h2>区间 B — 十三转 Countdown</h2>
    <div class="table-wrap" id="cdTable"></div>
    <h2>过滤器结果</h2>
    <div id="filters" class="filter-box"></div>
  </main>
  <script src="/static/js/api.js?v=20260626"></script>
  <script src="/static/js/nav.js?v=20260626"></script>
  <script>
    initNav();
    const params = new URLSearchParams(location.search);
    const code = params.get('code') || '';
    const tradeDate = params.get('trade_date') || '';

    function yn(v) { return v ? '<span class="ok">✓</span>' : '<span class="no">✗</span>'; }
    function num(v, d=2) { return v == null || Number.isNaN(v) ? '—' : Number(v).toFixed(d); }
    function volTagLabel(v) {
      const map = { shrink: '缩量', expand: '放量', neutral: '中性' };
      return map[v] || v || '—';
    }

    function renderSetupTable(bars) {
      if (!bars || !bars.length) return '<p class="footnote">无</p>';
      const rows = bars.map(b => `<tr>
        <td>${b.seq}</td><td class="tl">${b.trade_date}</td><td>${num(b.close)}</td>
        <td class="tl">${b.ref_date}</td><td>${num(b.ref_close)}</td><td>${yn(b.passed)}</td>
      </tr>`).join('');
      return `<table class="det"><thead><tr>
        <th>#</th><th class="tl">日期</th><th>收盘</th><th class="tl">比较日</th><th>比较收盘</th><th>满足</th>
      </tr></thead><tbody>${rows}</tbody></table>`;
    }

    function renderCdTable(bars) {
      if (!bars || !bars.length) return '<p class="footnote">尚未开始或暂无计数</p>';
      const rows = bars.map(b => {
        const extra = b.extra_13v8
          ? `<br/><small>13/8: low=${num(b.extra_13v8.low_t13)} vs C8=${num(b.extra_13v8.c8_close)} ${yn(b.extra_13v8.passed)}</small>`
          : '';
        return `<tr>
          <td>${b.seq}</td><td class="tl">${b.trade_date}</td><td>${num(b.close)}</td>
          <td class="tl">${b.ref_date}</td><td>${num(b.ref_low)}</td><td>${yn(b.passed)}${extra}</td>
        </tr>`;
      }).join('');
      return `<table class="det"><thead><tr>
        <th>#</th><th class="tl">日期</th><th>收盘</th><th class="tl">比较日</th><th>2日前低</th><th>满足</th>
      </tr></thead><tbody>${rows}</tbody></table>`;
    }

    function macdReasonLabel(code) {
      const map = {
        no_cd13: '未完成十三转',
        macd_nan: 'MACD 数据不足',
        no_target_valley: '未识别目标谷底',
        not_converged: '谷底未收敛',
        insufficient_refs: '历史参照不足',
        divergence_failed: '矩阵比较未通过',
      };
      return map[code] || code || '';
    }

    function renderMacdDivDetail(md) {
      if (!md || (!md.p0_date && !md.reason)) {
        return '<p class="footnote">暂无底背离数据（需先达成列4 十三转）</p>';
      }
      const tv = md.target_valley || {};
      const pct = v => v == null ? '—' : `${(Number(v) * 100).toFixed(1)}%`;
      let html = `
        <div><strong>底背离（列5）</strong>：${yn(md.passed)}${md.reason ? ` <span class="footnote">（${macdReasonLabel(md.reason)}）</span>` : ''}</div>
        <div><strong>P0</strong>：${md.p0_date || '—'} · Low ${num(md.p0_low)} · DIF ${num(md.p0_dif, 3)}</div>
        <div><strong>评估日</strong>：${md.eval_date || '—'} · 封闭进度 ${pct(md.closure_progress_eval)}（P0日 ${pct(md.closure_progress_p0)}）</div>
        <div><strong>目标谷底</strong>：峰 ${tv.peak_date || '—'} → 谷 ${tv.trough_date || '—'} · ${tv.closed ? '已封闭' : '收敛中'}${tv.golden_cross_date ? ` · 金叉 ${tv.golden_cross_date}` : ''}</div>
      `;
      const refs = md.refs || [];
      if (refs.length) {
        const rows = refs.map((r, i) => `<tr>
          <td class="tl">#${i + 1}</td>
          <td class="tl">${r.peak_date || '—'}</td>
          <td class="tl">${r.p0_date}</td>
          <td>${num(r.p0_low)}</td>
          <td>${num(r.p0_dif, 3)}</td>
          <td>${yn(r.price_lower)}</td>
          <td>${yn(r.dif_higher)}</td>
        </tr>`).join('');
        html += `<div class="macd-sub table-wrap"><table class="det"><thead><tr>
          <th class="tl">#</th><th class="tl">参照峰日</th><th class="tl">参照低点日</th>
          <th>参照Low</th><th>参照DIF</th><th>价新低</th><th>DIF抬高</th>
        </tr></thead><tbody>${rows}
        <tr>
          <td class="tl" colspan="3"><strong>当前 P0</strong>（${md.p0_date}）</td>
          <td>${num(md.p0_low)}</td>
          <td>${num(md.p0_dif, 3)}</td>
          <td>${yn(md.price_lower_all ?? md.price_lower)}</td>
          <td>${yn(md.dif_higher_all ?? md.macd_higher)}</td>
        </tr></tbody></table></div>`;
      } else if (md.reason === 'insufficient_refs' || md.refs_found === 0) {
        html += '<p class="footnote macd-sub">未找到足够的历史已封闭参照谷底</p>';
      }
      return html;
    }

    async function load() {
      if (!code) {
        document.getElementById('status').textContent = '缺少股票代码';
        return;
      }
      const q = tradeDate ? `?trade_date=${encodeURIComponent(tradeDate)}` : '';
      const d = await apiGet(`/api/td-sequential/stocks/${code}${q}`);
      document.getElementById('title').textContent = `${d.stock_code} ${d.stock_name || ''} — 九转明细`;
      document.getElementById('status').textContent = `扫描日 ${d.scan_trade_date} · 回溯 ${d.lookback_days} 日 · 最高列 ${d.max_col}${d.from_cache ? ' · 来自缓存' : ''}`;
      document.getElementById('summary').innerHTML = `
        <strong>九转日</strong> ${d.active_setup_9_date || '—'} ·
        <strong>十三转起始</strong> ${d.countdown_start_date || '—'} ·
        <strong>区间间隔</strong> ${d.gap_setup_to_cd_days ?? '—'} 交易日 ·
        <strong>十三转日</strong> ${(d.countdown_bars && d.countdown_bars.length === 13) ? d.countdown_bars[12].trade_date : '—'} ·
        <strong>止损参考</strong> ${num(d.stop_loss_price)}
      `;
      document.getElementById('setupTable').innerHTML = renderSetupTable(d.setup_bars);
      document.getElementById('cdTable').innerHTML = renderCdTable(d.countdown_bars);
      const f = d.filters || {};
      document.getElementById('filters').innerHTML = `
        <div><strong>量价（列2）</strong>：${yn(f.vol_price?.passed)} 标签=${volTagLabel(f.vol_price?.vol_tag)} 下影=${num(f.vol_price?.lower_ratio)} 大阴剔除=${yn(!f.vol_price?.rejected_bear)}</div>
        <div><strong>临近13（列3）</strong>：${yn(f.near13?.passed)} 计数=${f.near13?.cd_count ?? '—'} 区间间隔=${f.near13?.gap_setup_to_cd_days ?? '—'}日</div>
        ${renderMacdDivDetail(f.macd_div)}
      `;
    }

    load().catch(e => {
      document.getElementById('status').textContent = '加载失败：' + (e.message || e);
    });
  </script>
</body>
</html>
