name: Deploy to Tencent Cloud

# 仅「手动触发」部署（Actions 页 → 本工作流 → Run workflow）。
# 默认采用手动部署（在服务器命令行执行 deploy/remote_deploy.sh），不随 push 自动跑，避免误部署。
# 如需启用 push 自动部署：取消下方 push 注释，并在 Settings → Secrets and variables → Actions 配置：
#   TENCENT_HOST / TENCENT_USER / TENCENT_SSH_KEY （可选 TENCENT_PORT / TENCENT_DEPLOY_PATH）
# 详见 docs/DEPLOY.md。

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

concurrency:
  group: deploy-tencent
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 准备 SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${{ secrets.TENCENT_PORT }}"; PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.TENCENT_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 通过 SSH 部署
        env:
          HOST: ${{ secrets.TENCENT_HOST }}
          USER: ${{ secrets.TENCENT_USER }}
          PORT: ${{ secrets.TENCENT_PORT }}
          DEPLOY_PATH: ${{ secrets.TENCENT_DEPLOY_PATH }}
        run: |
          PORT="${PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/Trend_Analysis}"
          ssh -i ~/.ssh/id_deploy -p "$PORT" -o StrictHostKeyChecking=accept-new \
            "${USER}@${HOST}" \
            "set -e; cd '${DEPLOY_PATH}'; git fetch --prune origin main; git reset --hard origin/main; bash deploy/remote_deploy.sh"
